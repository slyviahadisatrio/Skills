name: CD

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload skills
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          API_BASE="https://api.anthropic.com/v1"

          # Fetch existing custom skills
          SKILLS=$(curl -s --fail-with-body "${API_BASE}/skills?beta=true&source=custom&limit=100" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: skills-2025-10-02" \
            -H "X-Api-Key: ${ANTHROPIC_API_KEY}")

          for skill_dir in */; do
            [ -f "${skill_dir}SKILL.md" ] || continue

            skill_name="${skill_dir%/}"

            # Match by display_title to find existing skill ID
            skill_id=$(echo "$SKILLS" | jq -r --arg name "$skill_name" \
              '.data[] | select(.display_title == $name) | .id // empty')

            # Collect all non-hidden files for multipart upload
            file_args=()
            while IFS= read -r -d '' file; do
              file_args+=(-F "files[]=@${file};filename=${file}")
            done < <(find "$skill_dir" -type f -not -name '.*' -print0)

            if [ -z "$skill_id" ]; then
              echo "Creating skill: ${skill_name}"
              curl -s --fail-with-body -X POST "${API_BASE}/skills?beta=true" \
                -H "anthropic-version: 2023-06-01" \
                -H "anthropic-beta: skills-2025-10-02" \
                -H "X-Api-Key: ${ANTHROPIC_API_KEY}" \
                -F "display_title=${skill_name}" \
                "${file_args[@]}"
            else
              echo "Updating skill: ${skill_name} (${skill_id})"
              curl -s --fail-with-body -X POST "${API_BASE}/skills/${skill_id}/versions?beta=true" \
                -H "anthropic-version: 2023-06-01" \
                -H "anthropic-beta: skills-2025-10-02" \
                -H "X-Api-Key: ${ANTHROPIC_API_KEY}" \
                "${file_args[@]}"
            fi

            echo ""
          done
